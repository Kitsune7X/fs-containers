events { }

http {
  server {
    listen 80;
    location / {
      # For hot loading
      # proxy_http_version 1.1;
      # proxy_set_header Upgrade $http_upgrade;
      # proxy_set_header Connection 'upgrade';

      # Pass request to app
      proxy_pass http://app:80;
    }

    location /api/ {
      proxy_pass http://server:3000/;
    }
  }
}